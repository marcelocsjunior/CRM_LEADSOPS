name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Compile sanity check
        run: |
          python -m compileall -q app.py leadops tests

      - name: Module import sanity check
        run: |
          python -c "import leadops, leadops.db, leadops.messages, leadops.scoring, leadops.utils; print('imports-ok')"

      - name: Run tests
        run: |
          pytest -q
